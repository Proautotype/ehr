databaseChangeLog:

  - changeSet:
      id: 2026-05-02-020-seed-stock-items
      author: custard
      changes:
        - sql:
            splitStatements: false
            sql: |

              INSERT INTO stock_items (
                  id,
                  drug_id,
                  drug_name,
                  form,
                  strength,
                  quantity_available,
                  created_at,
                  updated_at,
                  version
              )
              SELECT
                  gen_random_uuid(),
                  d.id,
                  d.name,
                  CASE
                      WHEN d.unit = 'TABLET' THEN 'Tablet'
                      WHEN d.unit = 'CAPSULE' THEN 'Capsule'
                      WHEN d.unit = 'SYRUP' THEN 'Syrup'
                      WHEN d.unit = 'INJECTION' THEN 'Injection'
                      WHEN d.unit = 'INHALER' THEN 'Inhaler'
                      ELSE 'Other'
                  END,
                  CASE
                      WHEN d.code LIKE '%500%' THEN '500mg'
                      WHEN d.code LIKE '%400%' THEN '400mg'
                      WHEN d.code LIKE '%250%' THEN '250mg'
                      WHEN d.code LIKE '%20%' THEN '20mg'
                      WHEN d.code LIKE '%10%' THEN '10mg'
                      WHEN d.code LIKE '%5%' THEN '5mg'
                      ELSE NULL
                  END,
                  CASE
                      WHEN d.code IN ('PARA500', 'IBU400', 'AMOX500') THEN 500
                      WHEN d.code IN ('AZI250', 'CIPRO500') THEN 300
                      WHEN d.code IN ('ALU', 'QUININE') THEN 200
                      WHEN d.code IN ('AMLO5', 'LISI10') THEN 150
                      WHEN d.code IN ('MET500', 'INS_REG') THEN 250
                      WHEN d.code IN ('OME20', 'LOP') THEN 180
                      WHEN d.code = 'SALB_INH' THEN 75
                      WHEN d.code = 'CET10' THEN 220
                      WHEN d.code = 'PARA_SYR' THEN 120
                      WHEN d.code = 'ADR_INJ' THEN 50
                      ELSE 100
                  END,
                  CURRENT_TIMESTAMP,
                  CURRENT_TIMESTAMP,
                  0
              FROM drugs d

              ON CONFLICT (drug_id) DO UPDATE
              SET
                  drug_name = EXCLUDED.drug_name,
                  form = EXCLUDED.form,
                  strength = EXCLUDED.strength,
                  quantity_available = EXCLUDED.quantity_available,
                  updated_at = CURRENT_TIMESTAMP;