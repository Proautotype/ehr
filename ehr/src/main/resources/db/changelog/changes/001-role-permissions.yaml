databaseChangeLog:
  - changeSet:
      id: 2026-05-02-001-enable-pgcrypto
      author: custard
      changes:
        - sql:
            sql: CREATE EXTENSION IF NOT EXISTS pgcrypto;

  - changeSet:
      id: 2026-05-02-002-seed-roles
      author: custard
      changes:
        - sql:
            splitStatements: false
            sql: |
              INSERT INTO app_roles (id, name, description, created_at, updated_at)
              VALUES
                (gen_random_uuid(), 'ADMIN', 'System administrator with full access', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
                (gen_random_uuid(), 'RECEPTIONIST', 'Handles patient registration and encounter creation', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
                (gen_random_uuid(), 'NURSE', 'Records vitals and supports clinical workflow', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
                (gen_random_uuid(), 'DOCTOR', 'Handles consultations, prescriptions, lab orders, and clinical decisions', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
                (gen_random_uuid(), 'LAB_TECHNICIAN', 'Processes lab orders and records lab results', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
                (gen_random_uuid(), 'PHARMACIST', 'Manages pharmacy stock and dispenses prescriptions', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
                (gen_random_uuid(), 'CASHIER', 'Creates invoices and records payments', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
              ON CONFLICT (name) DO UPDATE
              SET
                description = EXCLUDED.description,
                updated_at = CURRENT_TIMESTAMP;

