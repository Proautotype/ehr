  - changeSet:
      id: 2026-05-02-004-seed-role-permissions
      author: custard
      changes:
        - sql:
            splitStatements: false
            sql: |
              -- ADMIN gets all permissions
              INSERT INTO app_role_permissions (role_id, permission_id)
              SELECT r.id, p.id
              FROM app_roles r
              CROSS JOIN app_permissions p
              WHERE r.name = 'ADMIN'
              ON CONFLICT (role_id, permission_id) DO NOTHING;

              -- RECEPTIONIST
              INSERT INTO app_role_permissions (role_id, permission_id)
              SELECT r.id, p.id
              FROM app_roles r
              JOIN app_permissions p ON p.name IN (
                'PATIENT_REGISTER',
                'PATIENT_VIEW',
                'ENCOUNTER_CREATE',
                'ENCOUNTER_VIEW'
              )
              WHERE r.name = 'RECEPTIONIST'
              ON CONFLICT (role_id, permission_id) DO NOTHING;

              -- NURSE
              INSERT INTO app_role_permissions (role_id, permission_id)
              SELECT r.id, p.id
              FROM app_roles r
              JOIN app_permissions p ON p.name IN (
                'PATIENT_VIEW',
                'ENCOUNTER_VIEW',
                'VITALS_RECORD',
                'VITALS_VIEW'
              )
              WHERE r.name = 'NURSE'
              ON CONFLICT (role_id, permission_id) DO NOTHING;

              -- DOCTOR
              INSERT INTO app_role_permissions (role_id, permission_id)
              SELECT r.id, p.id
              FROM app_roles r
              JOIN app_permissions p ON p.name IN (
                'PATIENT_VIEW',
                'ENCOUNTER_VIEW',
                'CONSULTATION_WRITE',
                'CONSULTATION_VIEW',
                'PRESCRIPTION_CREATE',
                'PRESCRIPTION_VIEW',
                'PRESCRIPTION_CANCEL',
                'DRUG_VIEW',
                'LAB_ORDER_CREATE',
                'LAB_ORDER_VIEW',
                'VITALS_VIEW'
              )
              WHERE r.name = 'DOCTOR'
              ON CONFLICT (role_id, permission_id) DO NOTHING;

              -- LAB TECHNICIAN
              INSERT INTO app_role_permissions (role_id, permission_id)
              SELECT r.id, p.id
              FROM app_roles r
              JOIN app_permissions p ON p.name IN (
                'PATIENT_VIEW',
                'ENCOUNTER_VIEW',
                'LAB_ORDER_VIEW',
                'LAB_RESULT_WRITE'
              )
              WHERE r.name = 'LAB_TECHNICIAN'
              ON CONFLICT (role_id, permission_id) DO NOTHING;

              -- PHARMACIST
              INSERT INTO app_role_permissions (role_id, permission_id)
              SELECT r.id, p.id
              FROM app_roles r
              JOIN app_permissions p ON p.name IN (
                'PATIENT_VIEW',
                'PRESCRIPTION_VIEW',
                'PHARMACY_VIEW',
                'PHARMACY_DISPENSE',
                'STOCK_VIEW',
                'STOCK_MANAGE',
                'DRUG_VIEW'
              )
              WHERE r.name = 'PHARMACIST'
              ON CONFLICT (role_id, permission_id) DO NOTHING;

              -- CASHIER
              INSERT INTO app_role_permissions (role_id, permission_id)
              SELECT r.id, p.id
              FROM app_roles r
              JOIN app_permissions p ON p.name IN (
                'PATIENT_VIEW',
                'ENCOUNTER_VIEW',
                'INVOICE_CREATE',
                'INVOICE_VIEW',
                'PAYMENT_RECORD',
                'PAYMENT_VIEW',
                'PAYMENT_WAIVE'
              )
              WHERE r.name = 'CASHIER'
              ON CONFLICT (role_id, permission_id) DO NOTHING;