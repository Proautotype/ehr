  # --------------------------------------------------
  # ASSIGN ROLES TO USERS
  # --------------------------------------------------

  - changeSet:
      id: 2026-05-02-006-assign-user-roles
      author: custard
      changes:
        - sql:
            splitStatements: false
            sql: |

              INSERT INTO user_roles (id, user_id, role_id, created_at, updated_at)
              SELECT
                gen_random_uuid(),
                u.id,
                r.id,
                CURRENT_TIMESTAMP,
                CURRENT_TIMESTAMP
              FROM app_users u
              JOIN app_roles r ON r.name = 'ADMIN'
              WHERE u.username = 'admin'
              ON CONFLICT DO NOTHING;

              INSERT INTO user_roles (id, user_id, role_id, created_at, updated_at)
              SELECT gen_random_uuid(), u.id, r.id, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP
              FROM app_users u JOIN app_roles r ON r.name = 'RECEPTIONIST'
              WHERE u.username = 'receptionist'
              ON CONFLICT DO NOTHING;

              INSERT INTO user_roles (id, user_id, role_id, created_at, updated_at)
              SELECT gen_random_uuid(), u.id, r.id, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP
              FROM app_users u JOIN app_roles r ON r.name = 'NURSE'
              WHERE u.username = 'nurse'
              ON CONFLICT DO NOTHING;

              INSERT INTO user_roles (id, user_id, role_id, created_at, updated_at)
              SELECT gen_random_uuid(), u.id, r.id, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP
              FROM app_users u JOIN app_roles r ON r.name = 'DOCTOR'
              WHERE u.username = 'doctor'
              ON CONFLICT DO NOTHING;

              INSERT INTO user_roles (id, user_id, role_id, created_at, updated_at)
              SELECT gen_random_uuid(), u.id, r.id, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP
              FROM app_users u JOIN app_roles r ON r.name = 'LAB_TECHNICIAN'
              WHERE u.username = 'labtech'
              ON CONFLICT DO NOTHING;

              INSERT INTO user_roles (id, user_id, role_id, created_at, updated_at)
              SELECT gen_random_uuid(), u.id, r.id, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP
              FROM app_users u JOIN app_roles r ON r.name = 'PHARMACIST'
              WHERE u.username = 'pharmacist'
              ON CONFLICT DO NOTHING;

              INSERT INTO user_roles (id, user_id, role_id, created_at, updated_at)
              SELECT gen_random_uuid(), u.id, r.id, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP
              FROM app_users u JOIN app_roles r ON r.name = 'CASHIER'
              WHERE u.username = 'cashier'
              ON CONFLICT DO NOTHING;