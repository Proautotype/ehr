spring:
  application:
    name: ehr

  datasource:
    url: jdbc:postgresql://localhost:5432/ehr
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Optional: If you want to use a specific schema for your modules
        # default_schema: public
  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    properties:
      spring.json.add.type.headers: false

  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true
      republish-outstanding-events-on-restart: true

security:
  jwt:
    secret: a-very-long-and-secure-secret-key-that-is-at-least-32-chars
    expiration-minutes: 10
    access-token-expiration-minutes: 60
    refresh-token-expiration-minutes: 10080

app:
  kafka:
    topics:
      payment-events: payment-events

